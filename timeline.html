    <style>
        .timeline-wrapper {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: auto;
            max-height: calc(100vh - 220px);
            margin-top: 25px;
            scrollbar-width: thin;
            scrollbar-color: #6366f1 transparent;
        }

        .gantt-table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            font-size: 0.85rem;
            font-family: 'Outfit', sans-serif;
        }

        /* Header Styles - Royal Indigo Theme */
        .gantt-table thead th {
            background: #4f46e5;
            color: #ffffff;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid #4338ca;
            border-right: 1px solid #4338ca;
            padding: 15px 12px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .gantt-table thead .month-header { 
            background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            font-size: 1.1rem; 
            padding: 18px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 2px;
            border-right: none;
        }
        
        .gantt-table thead .day-header { 
            background: #f8fafc; 
            color: #475569; 
            min-width: 45px; 
            font-weight: 700;
            font-size: 0.7rem;
            border-bottom: 2px solid #e2e8f0;
            line-height: 1.4;
        }

        .gantt-table thead .day-header.weekend {
            background: #fef2f2;
            color: #ef4444;
            border-bottom: 2px solid #fecaca;
        }

        /* Sticky Columns - FIX CONTRAST */
        .sticky-col {
            position: sticky;
            left: 0;
            background: white !important;
            z-index: 20;
        }

        thead th.sticky-col {
            background: #4f46e5 !important;
            color: white !important;
        }

        .sticky-col::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to right, rgba(79, 70, 229, 0.1), transparent);
            pointer-events: none;
        }

        .col-wbs { left: 0; width: 60px; min-width: 60px; text-align: center; color: #94a3b8; font-weight: 700; }
        .col-task { left: 60px; width: 320px; min-width: 320px; font-weight: 600; color: #1e293b; text-align: left !important; }
        .col-start, .col-end { width: 110px; text-align: center; color: #64748b; }
        .col-duration { width: 80px; text-align: center; font-weight: 700; color: #4338ca; }
        .col-percent { 
            width: 100px; 
            text-align: center; 
            font-weight: 800; 
            border-right: 2px solid #6366f1 !important;
        }

        /* Row Styles */
        .row-parent { 
            background: #f5f3ff !important; 
        }
        .row-parent td { 
            font-weight: 800; 
            color: #4338ca;
            border-bottom: 2px solid #ddd6fe;
            padding: 15px 12px !important;
        }

        .gantt-table tbody td {
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            padding: 12px;
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: #f8fafc;
        }

        /* Gantt Bars - Vibrant Violet */
        .day-cell { padding: 8px !important; width: 45px; height: 55px; }
        .task-bar {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            height: 100%;
            width: 100%;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .task-bar:hover {
            transform: scaleY(1.15);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
            z-index: 10;
        }
        
        .day-cell.weekend-col { background: #fafafa; }
        
        /* Percent Badge Style */
        .pct-box {
            padding: 6px 0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            display: block;
            width: 80%;
            margin: 0 auto;
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
    </style>
</head>
