<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản nhân viên</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Hệ Thống Quản lý Công Việc </h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><span class="icon">👥</span> Danh sách nhân viên</a></li>
                <li><a href="tasks.html"><span class="icon">📅</span> Công việc</a></li>
                <li><a href="report.html"><span class="icon">📊</span> Báo cáo</a></li>
                <li><a href="accounts.html" class="active"><span class="icon">🔑</span> Tài khoản nhân viên</a></li>
                <li style="margin-top: auto;">
                    <a href="login.html" onclick="sessionStorage.clear(); localStorage.clear();" style="color: #f44336;">
                        <span class="icon">🚪</span> Đăng xuất
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Nội dung chính -->
        <div class="main-wrapper">
            <header class="page-header"
                style="justify-content: space-between; display: flex; align-items: center; padding: 1rem 2rem;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h1 class="main-title" style="font-size: 2rem;">Quản Lý Tài Khoản</h1>
                    <button id="btnAddAccount"
                        style="background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 6px;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Thêm tài khoản
                    </button>
                </div>
            </header>

            <div class="container">
                <main class="content-wrapper">
                    <section class="card">
                        <div class="table-container">
                            <table class="report-table">
                                <thead>
                                    <tr>
                                        <th style="background-color: #f1f5f9; padding: 1rem;">Mã Nhân Viên</th>
                                        <th style="background-color: #f1f5f9; padding: 1rem;">Tên Nhân Viên</th>
                                        <th style="background-color: #f1f5f9; padding: 1rem;">Mật khẩu hiện tại</th>
                                        <th style="background-color: #f1f5f9; padding: 1rem; width: 120px;">Thao tác
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="accountsBody">
                                    <!-- Dữ liệu render từ accounts.js -->
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <!-- Modal Cập nhật Tài Khoản -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Cập nhật Tài khoản</h2>
                <button class="btn-close" id="btnCloseModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Mã Nhân Viên</label>
                        <input type="text" id="modal_ma_nv" readonly style="background-color: #f1f5f9;">
                    </div>
                    <div class="form-group">
                        <label>Tên Nhân Viên <span style="color: red;">*</span></label>
                        <input type="text" id="modal_ten_nv" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span style="color: red;">*</span></label>
                        <input type="text" id="modal_mat_khau" required placeholder="Nhập mật khẩu mới...">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btnCancelModal">Hủy bỏ</button>
                <button class="btn-apply" id="btnSavePassword">Update</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Tài Khoản -->
    <div id="addAccountModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Thêm Tài Khoản Mới</h2>
                <button class="btn-close" id="btnCloseAddModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addAccountForm">
                    <div class="form-group">
                        <label>Mã Nhân Viên (Tài khoản) <span style="color: red;">*</span></label>
                        <input type="text" id="add_ma_nv" required placeholder="Ví dụ: NV02">
                    </div>
                    <div class="form-group">
                        <label>Tên Nhân Viên <span style="color: red;">*</span></label>
                        <input type="text" id="add_ten_nv" required placeholder="Nhập tên nhân viên...">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span style="color: red;">*</span></label>
                        <input type="text" id="add_mat_khau" required placeholder="Khởi tạo mật khẩu...">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btnCancelAddModal">Hủy bỏ</button>
                <button class="btn-apply" id="btnSaveNewAccount">Tạo tài khoản</button>
            </div>
        </div>
    </div>

    <script src="accounts.js"></script>
</body>

</html>
