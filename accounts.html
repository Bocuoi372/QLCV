<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản nhân viên</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li>
                    <a href="index.html">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span>Danh sách nhân viên</span>
                    </a>
                </li>
                <li>
                    <a href="tasks.html">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>Công việc</span>
                    </a>
                </li>
                <li>
                    <a href="report.html">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        <span>Báo cáo</span>
                    </a>
                </li>
                <li>
                    <a href="timeline.html">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        <span>Tổng hợp lịch trình</span>
                    </a>
                </li>
                <li>
                    <a href="accounts.html" class="active">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <span>Tài khoản nhân viên</span>
                    </a>
                </li>
                <li style="margin-top: auto;">
                    <a href="login.html" onclick="sessionStorage.clear(); localStorage.clear();" style="color: var(--danger);">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        <span>Đăng xuất</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Nội dung chính -->
        <div class="main-wrapper">
            <div class="container">
                <header class="page-header">
                    <div>
                        <h1 class="main-title">QUẢN LÝ TÀI KHOẢN</h1>
                        <p class="page-subtitle">Quản lý thông tin đăng nhập và quyền truy cập của nhân viên</p>
                    </div>
                    <button id="btnAddAccount" class="btn-add">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 8px; vertical-align: middle;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Thêm tài khoản
                    </button>
                </header>

                <main class="content-wrapper">
                    <section class="card">
                        <div class="table-container">
                            <table class="report-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">STT</th>
                                        <th>Mã Nhân Viên</th>
                                        <th>Tên Nhân Viên</th>
                                        <th>Quyền hạn</th>
                                        <th>Mật khẩu hiện tại</th>
                                        <th style="width: 120px;">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="accountsBody">
                                    <!-- Dữ liệu render từ accounts.js -->
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <!-- Modal Cập nhật Tài Khoản -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Cập nhật Tài khoản</h2>
                <button class="btn-close" id="btnCloseModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Mã Nhân Viên</label>
                        <input type="text" id="modal_ma_nv" readonly style="background-color: #f1f5f9;">
                    </div>
                    <div class="form-group">
                        <label>Tên Nhân Viên <span style="color: red;">*</span></label>
                        <input type="text" id="modal_ten_nv" required>
                    </div>
                    <div class="form-group">
                        <label>Quyền hạn</label>
                        <select id="modal_quyen_han">
                            <option value="3">Nhân viên (Staff)</option>
                            <option value="2">Quản lý (Manager)</option>
                            <option value="1">Quản trị viên (Admin)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span style="color: red;">*</span></label>
                        <input type="text" id="modal_mat_khau" required placeholder="Nhập mật khẩu mới...">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btnCancelModal">Hủy bỏ</button>
                <button class="btn-apply" id="btnSavePassword">Update</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Tài Khoản -->
    <div id="addAccountModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Thêm Tài Khoản Mới</h2>
                <button class="btn-close" id="btnCloseAddModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addAccountForm">
                    <div class="form-group">
                        <label>Mã Nhân Viên (Tài khoản) <span style="color: red;">*</span></label>
                        <input type="text" id="add_ma_nv" required placeholder="Ví dụ: NV02">
                    </div>
                    <div class="form-group">
                        <label>Tên Nhân Viên <span style="color: red;">*</span></label>
                        <input type="text" id="add_ten_nv" required placeholder="Nhập tên nhân viên...">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span style="color: red;">*</span></label>
                        <input type="text" id="add_mat_khau" required placeholder="Khởi tạo mật khẩu...">
                    </div>
                    <div class="form-group">
                        <label>Quyền hạn</label>
                        <select id="add_quyen_han">
                            <option value="3" selected>Nhân viên (Staff)</option>
                            <option value="2">Quản lý (Manager)</option>
                            <option value="1">Quản trị viên (Admin)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btnCancelAddModal">Hủy bỏ</button>
                <button class="btn-apply" id="btnSaveNewAccount">Tạo tài khoản</button>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="accounts.js?v=3"></script>
</body>

</html>
